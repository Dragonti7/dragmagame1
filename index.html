<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="캣시티 점프 - 고양이가 도시 위를 점프하는 캐주얼 게임">
    <title>🐱 캣시티 점프 | Cat City Jump</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>
        <!-- UI Overlay -->
        <div id="ui-overlay">
            <!-- Title Screen -->
            <div id="title-screen" class="screen active">
                <div class="title-logo">
                    <span class="title-cat">🐱</span>
                    <h1>캣시티 점프</h1>
                    <p class="subtitle">Cat City Jump</p>
                </div>
                <div class="title-info">
                    <div class="high-score-display">
                        <span>🏆 최고 기록</span>
                        <span id="title-high-score">0</span>
                    </div>
                </div>
                <button id="start-btn" class="btn-primary">🎮 게임 시작</button>
                <div class="control-hint">
                    <p>⌨️ 방향키 ←→ 또는 📱 기울이기로 조작</p>
                </div>
            </div>

            <!-- HUD -->
            <div id="hud" class="screen">
                <div class="hud-top">
                    <div class="hud-score">
                        <span class="hud-label">점수</span>
                        <span id="hud-score-value">0</span>
                    </div>
                    <div class="hud-floor">
                        <span id="hud-floor-name">1F 골목길</span>
                    </div>
                    <button id="pause-btn" class="btn-icon">⏸️</button>
                </div>
                <!-- Floor transition banner -->
                <div id="floor-banner" class="floor-banner hidden">
                    <span id="floor-banner-text">주택가 돌파!</span>
                </div>
            </div>

            <!-- Pause Screen -->
            <div id="pause-screen" class="screen overlay">
                <div class="modal">
                    <h2>⏸️ 일시정지</h2>
                    <button id="resume-btn" class="btn-primary">▶️ 계속하기</button>
                    <button id="restart-btn-pause" class="btn-secondary">🔄 재시작</button>
                    <button id="main-btn" class="btn-secondary">🏠 메인으로</button>
                </div>
            </div>

            <!-- Game Over Screen -->
            <div id="gameover-screen" class="screen overlay">
                <div class="modal gameover-modal">
                    <div class="gameover-cat">😿</div>
                    <h2>게임 오버</h2>
                    <div class="gameover-stats">
                        <div class="stat">
                            <span class="stat-label">점수</span>
                            <span id="final-score" class="stat-value">0</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">최고 기록</span>
                            <span id="final-high-score" class="stat-value">0</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">도달 층</span>
                            <span id="final-floor" class="stat-value">1F</span>
                        </div>
                    </div>
                    <!-- Progress Tower -->
                    <div class="progress-tower">
                        <div class="tower-label">🏙️ 도달 현황</div>
                        <div class="tower-track">
                            <div class="tower-fill" id="tower-fill"></div>
                            <div class="tower-cat-marker" id="tower-cat-marker">🐱</div>
                            <div class="tower-floors">
                                <div class="tower-floor" data-floor="4"><span class="tf-name">5F 하늘 위</span><span
                                        class="tf-score">10,000+</span></div>
                                <div class="tower-floor" data-floor="3"><span class="tf-name">4F 마천루</span><span
                                        class="tf-score">6,000</span></div>
                                <div class="tower-floor" data-floor="2"><span class="tf-name">3F 도심</span><span
                                        class="tf-score">3,000</span></div>
                                <div class="tower-floor" data-floor="1"><span class="tf-name">2F 주택가</span><span
                                        class="tf-score">1,000</span></div>
                                <div class="tower-floor" data-floor="0"><span class="tf-name">1F 골목길</span><span
                                        class="tf-score">0</span></div>
                            </div>
                        </div>
                    </div>
                    <div id="new-record" class="new-record hidden">🎉 새로운 기록!</div>
                    <button id="retry-btn" class="btn-primary">🔄 다시 도전</button>
                    <button id="main-btn-go" class="btn-secondary">🏠 메인으로</button>
                </div>
            </div>

            <!-- Control Mode Selector (Mobile) -->
            <div id="control-modal" class="screen overlay hidden">
                <div class="modal">
                    <h2>📱 조작 방식 선택</h2>
                    <button id="tilt-btn" class="btn-primary">📐 기울이기 모드</button>
                    <button id="touch-btn" class="btn-secondary">👆 터치 모드</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>

</html>
